<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h2>📷 Scan QR Code</h2>

<div id="reader"></div>

<script>
function onScanSuccess(decodedText) {
  // Open scanned link
  window.location.href = decodedText;
}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);
</script>
</body>
</html>
