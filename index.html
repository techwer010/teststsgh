<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  }

  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
  }

  .container {
    padding: 20px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin-top: 20px;
  }

  .subtitle {
    font-size: 14px;
    color: #cbd5f5;
    margin-top: 8px;
  }

  #reader {
    width: 90%;
    max-width: 350px;
    margin: 30px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 16px;
    margin-top: 20px;
  }

  .footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    font-size: 12px;
    color: #94a3b8;
  }

  .scan-line {
    position: absolute;
    width: 80%;
    height: 2px;
    background: #22c55e;
    top: 50%;
    left: 10%;
    animation: scan 2s infinite;
  }

  @keyframes scan {
    0% { top: 20%; }
    50% { top: 80%; }
    100% { top: 20%; }
  }
</style>
</head>

<body>

<div class="container">

  <div class="title">📷 Scan QR Code</div>
  <div class="subtitle">Instantly open booking page</div>

  <div id="reader"></div>

  <div class="card">
    ⚡ Fast scanning<br>
    🔒 Secure & private<br>
    📲 No app needed
  </div>

</div>

<div class="footer">
  Powered by your platform
</div>

<script>
function onScanSuccess(decodedText) {
  navigator.vibrate(100); // vibration feedback
  window.location.href = decodedText;
}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: { width: 250, height: 250 }
});

scanner.render(onScanSuccess);
</script>

</body>
</html>
